formatter: markdown table

# gh-actions bundles terraform-docs v0.20.0 (latest available in gh-actions v1.4.1).
# Keep constraint at >=0.20 until a newer gh-actions release embeds v0.24+.
version: ">=0.20"

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: false
  indent: 2
  required: true
  sensitive: true
  type: true

sort:
  enabled: true
  by: required
