formatter: markdown table

version: ">=0.19"

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: false
  indent: 2
  required: true
  sensitive: true
  type: true

sort:
  enabled: true
  by: required
