name: Feature Request
description: Suggest a new module, stack, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Proposed implementation
      description: Any ideas on how to approach this?
    validations:
      required: false
