name: Bug Report
description: Report a bug or unexpected infrastructure behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. terraform init
        2. terraform plan
        3. ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment
      placeholder: |
        Terraform version:
        Provider version:
        OS:
    validations:
      required: false
