name: security · scan

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "modules/**"
      - ".github/workflows/security-scan.yml"
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 08:00 UTC — catch new CVEs on existing config
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy IaC scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Scan — SARIF (Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "0" # don't fail here — upload first, then gate below

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-iac

      - name: Scan — fail on CRITICAL
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          format: table

  checkov:
    name: Checkov policy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Scan — SARIF (Security tab)
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true        # upload first, gate in next step
          quiet: true
          # CKV_TF_1 requires a commit hash; we use an immutable version tag on our
          # own internal module — tag traceability via `git tag -v` is sufficient.
          skip_check: "CKV_TF_1"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Scan — fail on HIGH+
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        with:
          directory: .
          framework: terraform
          check: "HIGH,CRITICAL"
          quiet: true
          skip_check: "CKV_TF_1"
