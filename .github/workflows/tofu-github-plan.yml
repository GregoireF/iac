name: opentofu · github · plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/github/**"
      - "modules/github/**"
      - ".github/workflows/_tofu-*.yml"
      - ".github/workflows/tofu-github-*.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tofu-github-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    # Dependabot PRs cannot access TF_API_TOKEN — skip plan for non-IaC changes
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/_tofu-plan.yml
    with:
      stack: terraform/github
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
