name: opentofu · test

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "terraform/**"
      - ".github/workflows/tofu-test.yml"
  push:
    branches: [main]
    paths:
      - "modules/**"
  workflow_dispatch:

concurrency:
  group: tofu-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (tofu test)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1

      - name: Test · modules/github/repository
        working-directory: modules/github/repository
        # mock_provider requires no backend — init with -backend=false
        run: |
          tofu init -backend=false -no-color -input=false
          tofu test -no-color
