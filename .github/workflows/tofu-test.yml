name: opentofu · test

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "terraform/**"
      - ".github/workflows/tofu-test.yml"
  push:
    branches: [main]
    paths:
      - "modules/**"
  workflow_dispatch:

concurrency:
  group: tofu-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (tofu test)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0

      - name: Test · modules/github/repository
        working-directory: modules/github/repository
        # mock_provider requires no backend — init with -backend=false
        run: |
          tofu init -backend=false -no-color -input=false
          tofu test -no-color
