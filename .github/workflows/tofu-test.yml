name: opentofu · test

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "terraform/**"
      - ".github/workflows/tofu-test.yml"
  push:
    branches: [main]
    paths:
      - "modules/**"
  workflow_dispatch:

concurrency:
  group: tofu-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (tofu test)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1

      - name: Test · modules/github/repository
        working-directory: modules/github/repository
        # mock_provider requires no backend — init with -backend=false
        run: |
          tofu init -backend=false -no-color -input=false
          tofu test -no-color
