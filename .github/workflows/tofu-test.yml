name: opentofu · test

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "terraform/**"
      - ".github/workflows/tofu-test.yml"
  push:
    branches: [main]
    paths:
      - "modules/**"
  workflow_dispatch:

concurrency:
  group: tofu-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (tofu test)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2

      - name: Test · modules/github/repository
        working-directory: modules/github/repository
        # mock_provider requires no backend — init with -backend=false
        run: |
          tofu init -backend=false -no-color -input=false
          tofu test -no-color
