name: security · scorecard

on:
  push:
    branches: [main]
  schedule:
    # Every Saturday at 01:30 UTC
    - cron: "30 1 * * 6"
  workflow_dispatch:

# OSSF Scorecard requires these exact permissions
permissions: read-all

jobs:
  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write  # publish signed results to API

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publishes results to public Scorecard API — remove if private repo
          publish_results: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: scorecard.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
