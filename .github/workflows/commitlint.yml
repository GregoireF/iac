name: commitlint

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Dependabot commit messages include full SHA hashes (165+ chars) and cannot
      # be shortened. Skip the lint step for bot PRs — the job still succeeds so
      # the required "Commitlint" check is satisfied.
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        if: github.actor != 'dependabot[bot]'
        with:
          configFile: .commitlintrc.yml
