name: auto-merge · dependabot

# Automatically enable auto-merge on Dependabot PRs.
# The PR merges once all required status checks pass — no human action needed.
# Requires allow_auto_merge = true on the repository (set in Terraform).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Enable auto-merge (patch + minor only)
        # Never auto-merge major version bumps — those need manual review.
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh label create "priority:high" --color "991b1b" \
            --description "High priority — address immediately" 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label "priority:high"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
