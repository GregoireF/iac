name: test · integration (Terratest)

# Integration tests create real GitHub resources — run on schedule + manual only.
# Never on every PR (too slow, too many API calls).

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Go test -run filter (default: all)"
        required: false
        default: "TestGitHub"

concurrency:
  group: integration-test
  cancel-in-progress: false # never cancel — partial teardown = orphaned resources

permissions:
  contents: read

jobs:
  terratest:
    name: Terratest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tests/go.mod
          cache: true
          cache-dependency-path: tests/go.sum

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2

      - name: Run integration tests
        working-directory: tests
        run: |
          go test -v \
            -run "${{ inputs.test_filter || 'TestGitHub' }}" \
            -timeout 15m \
            ./...
        env:
          GITHUB_TOKEN: ${{ secrets.GH_APP_TOKEN }}
          GITHUB_OWNER: ${{ vars.GH_OWNER }}
