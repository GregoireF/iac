name: test · integration (Terratest)

# Integration tests create real GitHub resources — run on schedule + manual only.
# Never on every PR (too slow, too many API calls).

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Go test -run filter (default: all)"
        required: false
        default: "TestGitHub"

concurrency:
  group: integration-test
  cancel-in-progress: false # never cancel — partial teardown = orphaned resources

permissions:
  contents: read

jobs:
  terratest:
    name: Terratest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tests/go.mod
          cache: true
          cache-dependency-path: tests/go.sum

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1

      - name: Run integration tests
        working-directory: tests
        run: |
          go test -v \
            -run "${{ inputs.test_filter || 'TestGitHub' }}" \
            -timeout 15m \
            ./...
        env:
          GITHUB_TOKEN: ${{ secrets.GH_APP_TOKEN }}
          GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
