name: _tofu · apply (reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: "Relative path to the OpenTofu stack (e.g. terraform/github)"
        type: string
        required: true
    secrets:
      TF_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  apply:
    name: Apply · ${{ inputs.stack }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: tofu -chdir=${{ inputs.stack }} init

      - name: Apply
        run: tofu -chdir=${{ inputs.stack }} apply -auto-approve -no-color
