name: _tofu · apply (reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: "Relative path to the OpenTofu stack (e.g. terraform/github)"
        type: string
        required: true
    secrets:
      TF_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  apply:
    name: Apply · ${{ inputs.stack }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: tofu -chdir=${{ inputs.stack }} init

      - name: Apply
        run: tofu -chdir=${{ inputs.stack }} apply -auto-approve -no-color
