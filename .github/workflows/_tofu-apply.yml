name: _tofu · apply (reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: "Relative path to the OpenTofu stack (e.g. terraform/github)"
        type: string
        required: true
    secrets:
      TF_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  apply:
    name: Apply · ${{ inputs.stack }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.stack }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: tofu init

      - name: Apply
        run: tofu apply -auto-approve -no-color
