name: opentofu · doppler · plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/doppler/**"
      - ".github/workflows/_tofu-*.yml"
      - ".github/workflows/tofu-doppler-*.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tofu-doppler-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    # Dependabot PRs cannot access TF_API_TOKEN — skip plan for non-IaC changes
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/_tofu-plan.yml
    with:
      stack: terraform/doppler
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
