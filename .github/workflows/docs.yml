name: docs

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
  push:
    branches: [main]
    paths:
      - "modules/**"

permissions:
  contents: read

jobs:
  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate / check terraform-docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1
        with:
          recursive: true
          recursive-path: modules/
          config-file: .terraform-docs.yml
          output-method: inject
          git-push: "${{ github.event_name == 'push' }}"
          git-push-user-name: "github-actions[bot]"
          git-push-user-email: "41898282+github-actions[bot]@users.noreply.github.com"
          git-commit-message: "docs: regenerate terraform-docs [skip ci]"
          fail-on-diff: "${{ github.event_name == 'pull_request' }}"
