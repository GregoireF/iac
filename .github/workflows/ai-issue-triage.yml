name: ai · issue triage

on:
  issues:
    types: [opened]

concurrency:
  group: ai-issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  models: read

jobs:
  triage:
    name: Triage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      models: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Triage issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/ai_issue_triage.py

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ AI triage encountered an error. [Check the run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
