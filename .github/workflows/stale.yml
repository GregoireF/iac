name: stale

on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is further activity. Add a comment or remove the `stale`
            label to keep it open.
          close-issue-message: "Closed after 37 days of inactivity."
          exempt-issue-labels: "priority:high,in-progress,blocked"
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has been inactive for 14 days and will be closed in 7 days
            unless there is further activity.
          close-pr-message: "Closed after 21 days of inactivity."
          exempt-pr-labels: "in-progress,blocked"
          remove-stale-when-updated: true
          operations-per-run: 100
