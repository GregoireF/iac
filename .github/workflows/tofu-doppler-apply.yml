name: opentofu · doppler · apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/doppler/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: tofu-doppler-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_tofu-apply.yml
    with:
      stack: terraform/doppler
    secrets: inherit
