name: opentofu · github · apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/github/**"
      - "modules/github/**"
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to apply (default: terraform/github)"
        required: false
        default: "terraform/github"

permissions: {}

# Never cancel an apply in progress
concurrency:
  group: tofu-github-apply
  cancel-in-progress: false

jobs:
  apply:
    uses: ./.github/workflows/_tofu-apply.yml
    with:
      stack: terraform/github
    secrets: inherit
