name: _tofu · plan (reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: "Relative path to the OpenTofu stack (e.g. terraform/github)"
        type: string
        required: true
    secrets:
      TF_API_TOKEN:
        required: true
    outputs:
      outcome:
        description: "Plan outcome: success or failure"
        value: ${{ jobs.plan.outputs.outcome }}

permissions:
  contents: read

jobs:
  plan:
    name: Plan · ${{ inputs.stack }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      outcome: ${{ steps.plan.outcome }}
    defaults:
      run:
        working-directory: ${{ inputs.stack }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Format check
        run: tofu fmt -check -recursive

      - name: Init
        run: tofu init

      - name: Validate
        run: tofu validate

      - name: Plan
        id: plan
        run: tofu plan -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs  = require('fs');
            const raw  = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const plan = raw.length > 55000
              ? '...(truncated — see full run)\n' + raw.slice(raw.length - 55000)
              : raw;

            const outcome = '${{ steps.plan.outcome }}';
            const icon    = outcome === 'success' ? '✅' : '❌';
            const marker  = `<!-- tofu-plan:${{ inputs.stack }} -->`;

            const body = [
              marker,
              `#### ${icon} OpenTofu Plan · \`${{ inputs.stack }}\` · \`${outcome}\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
              '',
              `> [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
