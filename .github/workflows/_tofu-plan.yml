name: _tofu ôñ plan (reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: "Relative path to the OpenTofu stack (e.g. terraform/github)"
        type: string
        required: true
    secrets:
      TF_API_TOKEN:
        required: true
    outputs:
      outcome:
        description: "Plan outcome: success or failure"
        value: ${{ jobs.plan.outputs.outcome }}

permissions:
  contents: read

jobs:
  plan:
    name: Plan ôñ ${{ inputs.stack }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      outcome: ${{ steps.plan.outcome }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Format check
        run: tofu -chdir=${{ inputs.stack }} fmt -check -recursive

      - name: Init
        run: tofu -chdir=${{ inputs.stack }} init

      - name: Validate
        run: tofu -chdir=${{ inputs.stack }} validate

      - name: Plan
        id: plan
        run: tofu -chdir=${{ inputs.stack }} plan -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs  = require('fs');
            const raw  = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const plan = raw.length > 55000
              ? '...(truncated ã see full run)\n' + raw.slice(raw.length - 55000)
              : raw;

            const outcome = '${{ steps.plan.outcome }}';
            const icon    = outcome === 'success' ? 'ã' : 'ã';
            const marker  = `<!-- tofu-plan:${{ inputs.stack }} -->`;

            const body = [
              marker,
              `#### ${icon} OpenTofu Plan ôñ \`${{ inputs.stack }}\` ôñ \`${outcome}\``,
              '',
              '<details><summary>Show output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
              '',
              `> [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
